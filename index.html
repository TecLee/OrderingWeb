<!doctype html>
<html lang="zh-CN" style="background: #010102;">
  <head>
    <meta charset="UTF-8" />
    <title>家庭私厨 - 点菜系统</title>

    <!-- Favicon (browser tab) -->
    <link rel="icon" type="image/png" href="/logo192.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Theme & App colors -->
    <meta name="theme-color" content="#5e6ad2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="家庭私厨" />

    <!-- iOS icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/logo180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/logo192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/logo512.png" />

    <!-- Microsoft tiles -->
    <meta name="msapplication-TileImage" content="/logo512.png" />
    <meta name="msapplication-TileColor" content="#5e6ad2" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
